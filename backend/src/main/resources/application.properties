COMPANY_NOT_FOUND_IN_DRIVE= Company not found in this drive.
ADMIN_REGISTER_NOT_ALLOWED=Admin accounts cannot be created from public registration.
ACCOUNT_BLOCKED=Your account has been blocked.
ADMIN_ACCESS_DENIED=Admin access denied.
INVALID_ACCOUNT_TYPE=Invalid account type for this action.
ALREADY_APPLIED=You have already applied to this job.
