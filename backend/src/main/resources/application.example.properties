spring.application.name=Job-Portal

spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/jobPortal_db?serverSelectionTimeoutMS=2000}
spring.data.mongodb.database=${MONGO_DATABASE:jobPortal_db}
spring.data.mongodb.auto-index-creation=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

jwt.secret=${JWT_SECRET:dev-only-change-this-jwt-secret-before-production-0123456789}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

